set -g mouse on

# 更改前缀键
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 窗口编号从1起始
set -g base-index 1
setw -g pane-base-index 1

# ---

# 新建窗口时继承当前目录，而非 home 目录
unbind c
bind c new-window -c "#{pane_current_path}"

# 水平/垂直分屏时也继承当前目录
unbind '"'
unbind %
bind '"' split-window -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# ---

# 使用vim的移动方式
set -g mode-keys vi

# 使用 Alt 键 + hjkl 直接切换窗格（无需前缀键）
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ---

# 开启真彩色
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",*:RGB"

# 激活窗口黄底黑字
set -g window-status-current-style "fg=black,bg=yellow"

# 设置状态栏样式
set -g status-style "bg=#b0d583,fg=#2C4909"

# 设置状态栏左侧和右侧内容
set -g status-left " #[fg=green]#S"
set -g status-right "%H:%M %y-%b-%d"

# 环境变量同步
set-option -g update-environment "DBUS_SESSION_BUS_ADDRESS DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"

# 窗格标题
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=green],#[fg=brightblack]}#P: #{pane_current_path} (#{pane_current_command})#[default]"
